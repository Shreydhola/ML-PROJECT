```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Page</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container{
            width: 100%;
            max-width: 700px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
            font-size: 35px;
        }

        .form-group{
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select,
        input{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #764ba2;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.02);
            background: #f1f1f1;
        }

        .result{
            margin-top: 25px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            font-size: 25px;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Student Exam Performance Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="form-group">
                <label>Gender</label>

                <select name="gender" required>

                    <option selected disabled value="">
                        Select Gender
                    </option>

                    <option value="male">
                        Male
                    </option>

                    <option value="female">
                        Female
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label>Race / Ethnicity</label>

                <select name="ethnicity" required>

                    <option selected disabled value="">
                        Select Group
                    </option>

                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>

                </select>
            </div>

            <div class="form-group">
                <label>Parental Education</label>

                <select name="parental_level_of_education" required>

                    <option selected disabled value="">
                        Select Education
                    </option>

                    <option value="associate's degree">
                        Associate Degree
                    </option>

                    <option value="bachelor's degree">
                        Bachelor's Degree
                    </option>

                    <option value="high school">
                        High School
                    </option>

                    <option value="master's degree">
                        Master's Degree
                    </option>

                    <option value="some college">
                        Some College
                    </option>

                    <option value="some high school">
                        Some High School
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label>Lunch Type</label>

                <select name="lunch" required>

                    <option selected disabled value="">
                        Select Lunch Type
                    </option>

                    <option value="free/reduced">
                        Free / Reduced
                    </option>

                    <option value="standard">
                        Standard
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label>Test Preparation Course</label>

                <select name="test_preparation_course" required>

                    <option selected disabled value="">
                        Select Course
                    </option>

                    <option value="none">
                        None
                    </option>

                    <option value="completed">
                        Completed
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label>Reading Score</label>

                <input
                    type="number"
                    name="reading_score"
                    placeholder="Enter Reading Score"
                    min="0"
                    max="100"
                    required
                >
            </div>

            <div class="form-group">
                <label>Writing Score</label>

                <input
                    type="number"
                    name="writing_score"
                    placeholder="Enter Writing Score"
                    min="0"
                    max="100"
                    required
                >
            </div>

            <button type="submit">
                Predict Maths Score
            </button>

        </form>

        {% if results %}

        <div class="result">

            Predicted Maths Score:
            {{ results }}

        </div>

        {% endif %}

    </div>

</body>

</html>
```
